<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>MALAK — animated cinematic title banner</title>
  <desc>Futuristic glowing animated banner for MALAK AI Mentor</desc>

  <defs>
    <style>
      .letter { font-family: 'Courier New', monospace; font-size: 88px; font-weight: 700; fill: none; stroke-width: 1.2; letter-spacing: 2px; }
      .sub { font-family: 'Courier New', monospace; font-size: 11px; fill: #00f3ff; letter-spacing: 8px; opacity: 0; animation: fadeInSub 1s ease 2.2s forwards; }
      .tagline { font-family: 'Courier New', monospace; font-size: 9px; fill: #334466; letter-spacing: 5px; }

      .scan { animation: scan 3s linear infinite; }
      .scan2 { animation: scan 3s linear 1.5s infinite; }

      .glow-all { stroke-dasharray: 1800; stroke-dashoffset: 1800; opacity: 0.25; stroke-width: 8; filter: blur(4px); animation: drawLetter 1.8s ease 0.1s both, glowPulse 2s ease 1.8s infinite; }
      .draw-all { stroke-dasharray: 1800; stroke-dashoffset: 1800; animation: drawLetter 1.8s ease 0.1s both; }

      .corner { opacity: 0; animation: fadeCorner 0.4s ease 2s forwards; }
      .grid-line { opacity: 0; animation: fadeGrid 1s ease 1.6s forwards; }
      .hline { animation: hlineSweep 2s ease 1.8s forwards; stroke-dasharray: 600; stroke-dashoffset: 600; }
      .dot { animation: dotPop 0.3s ease both; transform-origin: center; }

      @keyframes drawLetter { to { stroke-dashoffset: 0; } }
      @keyframes glowPulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.4; } }
      @keyframes fadeInSub { from { opacity: 0; } to { opacity: 0.7; } }
      @keyframes fadeCorner { to { opacity: 1; } }
      @keyframes fadeGrid { to { opacity: 1; } }
      @keyframes hlineSweep { to { stroke-dashoffset: 0; } }
      @keyframes scan {
        0%   { transform: translateY(-10px); opacity: 0; }
        10%  { opacity: 0.6; }
        90%  { opacity: 0.6; }
        100% { transform: translateY(290px); opacity: 0; }
      }
      @keyframes dotPop {
        0%   { transform: scale(0); opacity: 0; }
        60%  { transform: scale(1.4); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
    </style>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020818"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f3ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00f3ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#00f3ff"/>
      <stop offset="100%" stop-color="#0044ff"/>
    </linearGradient>
  </defs>

  <rect width="680" height="280" fill="url(#bgGrad)" rx="12"/>

  <g class="grid-line">
    <line x1="0" y1="40" x2="680" y2="40" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.08"/>
    <line x1="0" y1="80" x2="680" y2="80" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.08"/>
    <line x1="0" y1="120" x2="680" y2="120" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.08"/>
    <line x1="0" y1="160" x2="680" y2="160" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.08"/>
    <line x1="0" y1="200" x2="680" y2="200" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.08"/>
    <line x1="0" y1="240" x2="680" y2="240" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.08"/>
    <line x1="80"  y1="0" x2="80"  y2="280" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.06"/>
    <line x1="160" y1="0" x2="160" y2="280" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.06"/>
    <line x1="240" y1="0" x2="240" y2="280" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.06"/>
    <line x1="320" y1="0" x2="320" y2="280" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.06"/>
    <line x1="400" y1="0" x2="400" y2="280" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.06"/>
    <line x1="480" y1="0" x2="480" y2="280" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.06"/>
    <line x1="560" y1="0" x2="560" y2="280" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.06"/>
    <line x1="640" y1="0" x2="640" y2="280" stroke="#00f3ff" stroke-width="0.3" stroke-opacity="0.06"/>
  </g>

  <rect class="scan"  x="0" y="0" width="680" height="30" fill="url(#scanGrad)"/>
  <rect class="scan2" x="0" y="0" width="680" height="18" fill="url(#scanGrad)"/>

  <g class="corner">
    <line x1="20" y1="20" x2="50" y2="20" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="20" y1="20" x2="20" y2="50" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="660" y1="20" x2="630" y2="20" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="660" y1="20" x2="660" y2="50" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="20" y1="260" x2="50" y2="260" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="20" y1="260" x2="20" y2="230" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="660" y1="260" x2="630" y2="260" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="660" y1="260" x2="660" y2="230" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="20"  cy="20"  r="2" fill="#00f3ff" fill-opacity="0.5"/>
    <circle cx="660" cy="20"  r="2" fill="#00f3ff" fill-opacity="0.5"/>
    <circle cx="20"  cy="260" r="2" fill="#00f3ff" fill-opacity="0.5"/>
    <circle cx="660" cy="260" r="2" fill="#00f3ff" fill-opacity="0.5"/>
  </g>

  <line class="hline" x1="40" y1="196" x2="640" y2="196" stroke="#00f3ff" stroke-width="0.5" stroke-opacity="0.3"/>

  <text x="340" y="158" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="88" font-weight="700"
        fill="none" stroke="#00f3ff" letter-spacing="18"
        class="glow-all">MALAK</text>

  <text x="340" y="158" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="88" font-weight="700"
        fill="none" stroke="url(#letterGrad)" stroke-width="1.2" letter-spacing="18"
        class="draw-all">MALAK</text>

  <text class="sub" x="340" y="184" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10" letter-spacing="10" fill="#00f3ff">YOUR · AI · MENTOR</text>

  <text x="40"  y="34" font-family="'Courier New', monospace" font-size="8" fill="#1a2a3a" letter-spacing="4">SYS://MENTOR.AI</text>
  <text x="640" y="34" font-family="'Courier New', monospace" font-size="8" fill="#1a2a3a" letter-spacing="4" text-anchor="end">v1.0.0</text>

  <g class="corner">
    <text x="40"  y="255" font-family="'Courier New', monospace" font-size="7.5" fill="#0a2040" letter-spacing="3">CAIRO · EGYPT · 2025</text>
    <text x="640" y="255" font-family="'Courier New', monospace" font-size="7.5" fill="#0a2040" letter-spacing="3" text-anchor="end">BUILT BY MALAK M. SALEM</text>
  </g>

  <circle cx="334" cy="56" r="1.5" fill="#00f3ff" fill-opacity="0.4" class="dot" style="animation-delay:2.0s"/>
  <circle cx="346" cy="56" r="1.5" fill="#00f3ff" fill-opacity="0.4" class="dot" style="animation-delay:2.15s"/>
  <circle cx="358" cy="56" r="1.5" fill="#0066ff" fill-opacity="0.6" class="dot" style="animation-delay:2.3s"/>

  <rect x="0" y="0" width="680" height="280" fill="none" stroke="#00f3ff" stroke-width="0.5" stroke-opacity="0.12" rx="12"/>
</svg>
