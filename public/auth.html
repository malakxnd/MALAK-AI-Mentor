<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Control</title>
    <style>
        /* --- AURORA BACKGROUND (SAME AS LANDING) --- */
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            color: white; 
            display: flex; justify-content: center; align-items: center; height: 100vh; 
            background-color: #050510;
            overflow: hidden;
        }

        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 85% 20%, rgba(0, 243, 255, 0.2), transparent 40%),
                radial-gradient(circle at 15% 80%, rgba(29, 78, 216, 0.3), transparent 45%);
            filter: blur(80px);
        }
        
        /* CARD DESIGN (Glassmorphism) */
        .container { 
            width: 380px; 
            background: rgba(255, 255, 255, 0.05); /* Very subtle tint */
            backdrop-filter: blur(25px);            /* Heavy blur behind */
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center; 
        }
        
        h2 { font-weight: 300; margin-bottom: 40px; letter-spacing: 1px; font-size: 1.8rem; }
        
        /* INPUTS */
        input { 
            width: 100%; padding: 16px; margin: 8px 0; box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; border-radius: 12px; outline: none; transition: 0.3s; font-size: 1rem;
        }
        input:focus { border-color: #00f3ff; background: rgba(0, 0, 0, 0.5); }
        
        /* BUTTON */
        button { 
            width: 100%; padding: 16px; 
            background: white; color: #050510; 
            border: none; border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 30px; transition: 0.3s; 
        }
        button:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(0, 243, 255, 0.2); }
        
        .switch { margin-top: 25px; font-size: 14px; color: #aaa; cursor: pointer; transition: 0.3s; }
        .switch:hover { color: white; text-decoration: underline; }
        
        #error-msg { color: #ff6b6b; margin-top: 15px; font-size: 13px; display: none; }
    </style>
</head>
<body>

    <div class="aurora-bg"></div>

    <div class="container">
        <h2 id="form-title">Welcome Back</h2>
        
        <form id="auth-form" onsubmit="handleSubmit(event)">
            <input type="text" id="username" placeholder="Full Name" style="display:none;"> 
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn">Sign In</button>
        </form>

        <div id="error-msg"></div>
        <p class="switch" onclick="toggleMode()" id="switch-text">New here? Create an account</p>
    </div>

    <script>
        let isSignup = false;
        const API_URL = "http://localhost:3005/api";

        function toggleMode() {
            isSignup = !isSignup;
            const title = document.getElementById('form-title');
            const btn = document.getElementById('submit-btn');
            const switchText = document.getElementById('switch-text');
            const userInput = document.getElementById('username');
            const errorDiv = document.getElementById('error-msg');
            errorDiv.style.display = "none";

            if (isSignup) {
                title.innerText = "Create Account";
                btn.innerText = "Sign Up";
                switchText.innerText = "Already have an account? Sign In";
                userInput.style.display = "block";
                userInput.required = true;
            } else {
                title.innerText = "Welcome Back";
                btn.innerText = "Sign In";
                switchText.innerText = "New here? Create an account";
                userInput.style.display = "none";
                userInput.required = false;
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;
            const errorDiv = document.getElementById('error-msg');
            const btn = document.getElementById('submit-btn');

            const endpoint = isSignup ? "/register" : "/login";
            const body = isSignup ? { username, email, password } : { email, password };

            btn.innerText = "Processing...";
            btn.disabled = true;
            errorDiv.style.display = "none";

            try {
                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.error || "Access Denied");

                if (isSignup) {
                    alert("✅ Success! Check your email.");
                    toggleMode(); 
                } else {
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("userId", data.userId);
                    localStorage.setItem("username", data.username);
                    window.location.href = "chat.html"; 
                }

            } catch (err) {
                errorDiv.innerText = "⚠️ " + err.message;
                errorDiv.style.display = "block";
            } finally {
                btn.innerText = isSignup ? "Sign Up" : "Sign In";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
